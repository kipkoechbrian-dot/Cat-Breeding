<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cat Breeds</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Link to CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="cat-container">
        <div class="cat-breed">
            <img src="https://images.freeimages.com/images/large-previews/4bd/black-cat-1383472.jpg" alt="Breed 1">
            <h3>Black Cat</h3>
            <p>A mysterious and elegant cat known for its sleek black coat.</p>
            <a href="https://en.wikipedia.org/wiki/Black_cat" target="_blank">Learn More</a>
        </div>
        <div class="cat-breed">
            <img src="https://images.freeimages.com/images/large-previews/f19/maine-coon-cat-1542262.jpg" alt="Breed 2">
            <h3>Maine Coon</h3>
            <p>One of the largest domesticated breeds, friendly and very fluffy .</p>
            <a href="https://en.wikipedia.org/wiki/Maine_Coon" target="_blank">Learn More</a>
        </div>
        <div class="cat-breed">
            <img src="https://images.freeimages.com/images/large-previews/bd1/cat-1404368.jpg" alt="Breed 3">
            <h3>Domestic Cat</h3>
            <p>A common household companion known for its playful nature.</p>
            <a href="https://en.wikipedia.org/wiki/Cat" target="_blank">Learn More</a>
        </div>
    </div>
</body>
</html>
